name: 週次レポート送信

on:
  # 毎週日曜 朝3:27（JST）= UTC 18:27（土曜）
  schedule:
    - cron: '27 18 * * 6'

  # 手動実行
  workflow_dispatch:

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存関係をインストール
        run: npm ci

      - name: 週次レポートをLINE送信
        run: npm run send-line-weekly
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          INSTA_GEMINI_API_KEY: ${{ secrets.INSTA_GEMINI_API_KEY }}
