# 健康度判定の閾値
# この設定ファイルを編集するだけで判定基準を変更できます（コード変更不要）

upstream:
  healthy: 6      # ≥6本 = 🟢 安全（リサーチ中 + レシピ作成中 + 試作中）
  warning: 3      # 3〜5本 = 🟡 注意
  # ≤2本 = 🔴 危険

midstream:
  healthy: 3      # ≥3本 = 🟢 安全（レシピ作成中 + 試作中）
  warning: 1      # 1〜2本 = 🟡 注意
  # 0本 = 🔴 危険

downstream:
  healthy: 1      # ≥1本 = 🟢 安全（撮影中 + 動画編集中）
  # 0本 = 🔴 危険（注意レベルなし）

post_publish:
  healthy_days: 3   # 投稿完了から3日以内かつ下流 ≥ 1 = 🟢 安全
  warning_days: 5   # 〜5日 = 🟡 注意
  # 5日超かつ下流 = 0 = 🔴 危険
